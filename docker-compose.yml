services:
  db:
    image: pgvector/pgvector:pg16
    container_name: caintelligence_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: caintelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d caintelligence"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caintelligence_backend
    environment:
      # This compose stack is a local/dev containerized environment, not a real production
      # deployment - ENV must stay "development" here or the app's startup validation will
      # (correctly) refuse to boot with the placeholder JWT_SECRET and wildcard CORS below.
      - ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/caintelligence
      - JWT_SECRET=supersecretjwtkeyforlocaldevelopmentonly123!
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - LLM_PROVIDER=mock
      - EMBEDDING_PROVIDER=mock
      - OCR_PROVIDER=mock
      - STORAGE_PROVIDER=local
      - LOCAL_STORAGE_DIR=/app/uploads
      - CORS_ORIGINS=http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: caintelligence_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
